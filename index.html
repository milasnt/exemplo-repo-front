<!DOCTYPE html>

<!-- DTD é o Document Type Definition e informa para o navegador a versão do HTML que está sendo carregada. 
     Assim o navegador pode carregar um conjunto de bibliotecas de acordo com a versão específica.
-->

<!-- Atributos: 
     Os atributos são do tipo chave = valor.
     Exemplo: lang="pt-BR", isso é um atributo que pode ir em qualquer tag de conteúdo.
-->

<html lang="pt-br">
     <head>
          <meta charset="UTF-8">
          <title>Página Principal.</title>
     </head>

       </div>   
     </body>
</html>
